# settings.yaml (Optional overrides)

# Human recorder hotkey
human:
  record_hotkey: "F9" # Start/stop recording hotkey

# Agent collection settings
agent:
  policy_path: null # Set this to the absolute path of your trained SAC actor .tmod file
  map_name: "Summer 2026 - 01"
  map_uid: "unknown"

# Episode settings
episode_monitor:
  stuck_speed_kmh: 5.0 # If the car is below this speed for too long, reset
  stuck_window_frames: 60 # How many consecutive frames below stuck_speed_kmh
  max_frames_per_episode: 3000 # Hard reset limit per episode
  warmup_frames: 20 # Initial unrecorded frames after a map loads
