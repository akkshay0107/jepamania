# settings.yaml (Optional overrides)

# Agent collection settings
agent:
  policy_path: null # Set this to the absolute path of your trained SAC actor .tmod file
  map_name: "Summer 2026 - 01"
  map_uid: "unknown"
  exploration:
    ou_noise_mu: 0.0      # Mean the OU process reverts to (0 = unbiased)
    ou_noise_theta: 0.15  # Mean-reversion rate (higher = faster reversion)
    ou_noise_sigma: 0.05  # Noise volatility (lower = less jitter)
  filter:
    enabled: true
    steer_deadzone: 0.015 # Ignore steering jitter below this absolute threshold
    min_alpha: 0.5 # Minimum EMA weight (more smoothing for tiny jitter)
    max_alpha: 0.85 # Maximum EMA weight (less smoothing for fast turn-in)
    delta_scale: 0.3 # Steering delta required to reach max_alpha

# Episode settings
episode_monitor:
  stuck_speed_kmh: 3.0 # If the car is below this speed for too long, reset
  stuck_window_frames: 80 # How many consecutive frames below stuck_speed_kmh (80 frames = 4s at 20Hz)
  max_frames_per_episode: 1800 # Hard reset limit per episode (1800 frames = 1.5 minutes at 20Hz)
  episodes_per_shard: 50 # Number of episodes to save per file shard before starting a new file

# Online MPC Deployment settings
mpc:
  checkpoint_path: null # Path to combined (encoder, predictor) checkpoint (.eqx) e.g., checkpoints/finetune/ft_model_latest.eqx
  value_head_path: null # Optional path to pretrained MLPValueHead checkpoint (.eqx)
  planner_type: "cem"   # "cem", "beam", or "random"
  sequence_len: 10
  num_samples: 128
  num_iters: 3
  num_elites: 16
  beam_width: 16
  record_rollouts: false
  seed: 42
