encoder:
  latent_dim: 192
  transformer:
    num_layers: 3
    num_heads: 4
    mlp_ratio: 4.0

predictor:
  latent_dim: 192
  action_embed_dim: 16
  hidden_dim: 256

planner:
  type: "cem"
  sequence_len: 5
  smoothness_weight: 0.0
  # Beam Search
  beam_width: 5
  # Cross-Entropy Method (CEM)
  cem_iters: 4
  cem_samples: 128
  cem_elites: 25
  cem_alpha: 0.7
  # Random Shooting
  rs_samples: 500
