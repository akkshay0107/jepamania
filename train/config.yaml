loss:
  num_subspaces: 16
  subspace_dim: null
  num_slices: 16
  reg_weight: 0.5

pretrain:
  epochs: 10
  batch_size: 256
  lr: 3.0e-4
  rollout_len: 5
  num_workers: 1
  seed: 42
  log_every: 50
  val_ratio: 0.1

finetune:
  warmup_epochs: 3
  joint_epochs: 5
  gamma: 0.990
  lr_warmup: 5.0e-4
  lr_enc: 1.0e-5
  lr_val: 3.0e-4
  value_weight: 0.5
  batch_size: 64
  num_workers: 2
  seed: 42
  rollout_len: 5
  log_every: 50
